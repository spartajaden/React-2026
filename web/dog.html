<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐶 랜덤 강아지 사진</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #777;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .img-wrapper {
      width: 100%;
      height: 400px;
      border-radius: 16px;
      overflow: hidden;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      position: relative;
    }
    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .img-wrapper img.loaded {
      display: block;
    }
    .img-wrapper .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #ff6b6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      position: absolute;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .img-wrapper .placeholder-text {
      color: #aaa;
      font-size: 16px;
      z-index: 1;
    }
    button {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      letter-spacing: 1px;
    }
    button:hover {
      background: #ee5a5a;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    .breed-info {
      margin-top: 14px;
      color: #666;
      font-size: 14px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐶 귀여운 강아지</h1>
    <p class="subtitle">새로고침 or 버튼 클릭 → 다른 강아지 등장!</p>

    <div class="img-wrapper" id="imgWrapper">
      <div class="spinner" id="spinner"></div>
      <img id="dogImg" alt="랜덤 강아지 사진" />
    </div>

    <button id="newDogBtn">🐕 다른 강아지 보기</button>
    <p class="breed-info" id="breedInfo"></p>
  </div>

  <script>
    const dogImg = document.getElementById('dogImg');
    const spinner = document.getElementById('spinner');
    const breedInfo = document.getElementById('breedInfo');
    const newDogBtn = document.getElementById('newDogBtn');

    // 강아지 사진 불러오기
    async function loadDog() {
      // 로딩 상태 표시
      dogImg.classList.remove('loaded');
      spinner.style.display = 'block';
      breedInfo.textContent = '🐾 강아지를 데려오는 중...';

      try {
        const res = await fetch('https://dog.ceo/api/breeds/image/random');
        const data = await res.json();

        if (data.status === 'success') {
          // 이미지 로드 완료 후 표시
          dogImg.onload = () => {
            dogImg.classList.add('loaded');
            spinner.style.display = 'none';
          };
          dogImg.src = data.message;

          // 품종 정보 추출 (URL에서 추출)
          // 예: https://images.dog.ceo/breeds/hound-afghan/n02088094_1003.jpg
          const match = data.message.match(/breeds\/([^\/]+)/);
          if (match) {
            const breed = match[1].replace('-', ' ');
            breedInfo.textContent = `🐕 품종: ${breed}`;
          } else {
            breedInfo.textContent = '🐕 모르는 품종이지만 귀여워요!';
          }
        }
      } catch (err) {
        dogImg.classList.add('loaded');
        spinner.style.display = 'none';
        dogImg.src = '';
        breedInfo.textContent = '❌ 강아지를 데려오지 못했어요... 다시 시도해주세요!';
        console.error('API 오류:', err);
      }
    }

    // 버튼 클릭 시 새 강아지
    newDogBtn.addEventListener('click', loadDog);

    // 페이지 로드 시 첫 강아지
    loadDog();
  </script>
</body>
</html>
